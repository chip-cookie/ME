version: "3.8"

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: docmaster-vllm
    ports:
      - "8000:8000"
    volumes:
      - ./data/models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # MODEL_PATH는 .env 파일에서 주입됩니다.
    # 초기값: HuggingFace 공식 모델 (Fine-tuning 전)
    # 배포 후:  /models/qwen35-4b-docmaster-awq-<version>  (watch_and_deploy.py 자동 패치)
    command: >
      --model ${MODEL_PATH:-cyankiwi/Qwen3.5-4B-Instruct-AWQ-4bit}
      --quantization awq
      --max-model-len 4096
      --gpu-memory-utilization 0.85
      --dtype half
      --port 8000
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - MODEL_PATH=${MODEL_PATH:-cyankiwi/Qwen3.5-4B-Instruct-AWQ-4bit}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
